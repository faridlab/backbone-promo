components:
  schemas:
    CouponCode:
      type: object
      required:
        - id
        - company_id
        - code
        - pricing_rule_id
        - used_count
        - valid_from
        - is_active
        - metadata
      properties:
        id:
          type: string
          format: uuid
        company_id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 40
        pricing_rule_id:
          type: string
          format: uuid
        description:
          nullable: true
          type: string
          maxLength: 280
        max_use:
          nullable: true
          type: integer
          format: int32
        used_count:
          type: integer
          format: int32
        valid_from:
          type: string
          format: date-time
        valid_upto:
          nullable: true
          type: string
          format: date-time
        is_active:
          type: boolean
        metadata:
          type: object

    CouponCodeBulkResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CouponCode'
        total: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: string }

    CreateCouponCodeRequest:
      type: object
      required:
        - company_id
        - code
        - pricing_rule_id
        - used_count
        - valid_from
        - is_active
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 40
        pricing_rule_id:
          type: string
          format: uuid
        description:
          nullable: true
          type: string
          maxLength: 280
        max_use:
          nullable: true
          type: integer
          format: int32
        used_count:
          type: integer
          format: int32
        valid_from:
          type: string
          format: date-time
        valid_upto:
          nullable: true
          type: string
          format: date-time
        is_active:
          type: boolean
        metadata:
          type: object

    UpdateCouponCodeRequest:
      type: object
      required:
        - company_id
        - code
        - pricing_rule_id
        - used_count
        - valid_from
        - is_active
        - metadata
      properties:
        company_id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 40
        pricing_rule_id:
          type: string
          format: uuid
        description:
          nullable: true
          type: string
          maxLength: 280
        max_use:
          nullable: true

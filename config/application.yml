server:
  host: 0.0.0.0
  port: 3000
  grpc_port: 50051
database:
  url: postgresql://root:password@localhost:5432/backbonedb
  max_connections: 20
  min_connections: 5
  connect_timeout: 30
  idle_timeout: 600
module:
  name: promo
  enabled: true
features:
  soft_delete: true
  state_machines: true
  workflows: true
logging:
  level: info
  format: json
  file: logs/promo.log
tracing:
  enabled: true
  exporter: otlp
  endpoint: http://localhost:4317
metrics:
  enabled: true
  endpoint: /metrics
  port: 9090
entities:
  ad_performance:
    collection: ad_performances
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  advertisement:
    collection: advertisements
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  provider_promo:
    collection: provider_promos
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  promo_campaign:
    collection: promo_campaigns
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  coupon_code:
    collection: coupon_codes
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  loyalty_program:
    collection: loyalty_programs
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  loyalty_point_entry:
    collection: loyalty_point_entries
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  pricing_rule:
    collection: pricing_rules
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100
  coupon_redemption:
    collection: coupon_redemptions
    enabled: true
    cache_ttl: 300
    pagination:
      default_limit: 20
      max_limit: 100

# =============================================================================
# promo Module - Schema Index
# =============================================================================
# Version: 2.0
# Description: Pricing & promotions. `module:` and `schema:` are stamped from the
# module name. `schema:` gives this module its OWN Postgres schema (migrations
# emit `CREATE SCHEMA promo` and qualify tables as `promo.<table>`) — the
# convention every backbone module follows (see backbone-sapiens, backbone-pos).
# Do not remove it.
#
# This module POSTS NO GL. It resolves effective prices (the input seam consumed
# by selling + POS) and runs the loyalty points ledger (the inbound seam fed by
# billing/POS paid events). Money is region-neutral IDR; tax is billing/tax's job.
# =============================================================================

module: promo
version: 2
schema: promo
description: "pricing rules, coupons, and loyalty — resolves prices, posts no GL"

config:
  database: postgresql
  soft_delete: true
  audit: true
  default_timestamps: true
  generators:
    disabled:
      - graphql
      - grpc
      - proto

# Reuse sapiens for user identity (actors) — logical refs, no DB constraint.
external_imports:
  - module: sapiens
    types: [User]

# Shared value-object types available to all models in this module.
shared_types:
  Timestamps:
    created_at:
      type: datetime
      attributes: ["@default(now)"]
      description: "Record creation timestamp"
    updated_at:
      type: datetime
      attributes: ["@updated_at"]
      description: "Last update timestamp"
    deleted_at:
      type: datetime?
      description: "Soft delete timestamp"

  Actors:
    created_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who created this record"
    updated_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who last updated this record"
    deleted_by:
      type: uuid?
      attributes: ["@foreign_key(sapiens.User.id)"]
      description: "User who deleted this record"

  Metadata: [Timestamps, Actors]

# Import each entity model.
imports:
  - pricing_rule.model.yaml
  - coupon_code.model.yaml
  - coupon_redemption.model.yaml
  - loyalty_program.model.yaml

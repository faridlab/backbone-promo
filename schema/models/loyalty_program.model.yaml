# =============================================================================
# Domain: Promo
# Entities: LoyaltyProgram + LoyaltyPointEntry
# Description: The points ledger. A LoyaltyProgram fixes the earn rate
# (collection_factor: points per 1 currency spent) and the burn rate
# (conversion_factor: currency value per point on redemption). Each
# LoyaltyPointEntry is one signed movement (earned +, redeemed −, expired −) tied
# to a source document. Accrual is IDEMPOTENT per source: a unique
# (company_id, source_type, source_id, entry_type) key means one paid invoice
# earns points at most once, however many times the event is replayed. Points are
# NOT money and post NO GL — the entry is a loyalty subledger, not an accounting one.
# =============================================================================

models:
  - name: LoyaltyProgram
    collection: loyalty_programs
    description: "Earn/burn rates for a customer loyalty scheme"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique program id"
      company_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Books owner # logical FK to organization.Company.id"
      program_name:
        type: string
        attributes: ["@required", "@max(140)"]
        description: "Human name for the program"
      program_type:
        type: LoyaltyProgramType
        attributes: ["@required", "@default(single_tier)"]
        description: "Single flat rate or multi-tier (tier logic deferred)"

      collection_factor:
        type: decimal
        attributes: ["@required", "@precision(18,6)", "@non_negative"]
        description: "Points earned per 1.0 currency spent (e.g. 0.01 = 1 pt / 100 IDR)"
      conversion_factor:
        type: decimal
        attributes: ["@required", "@precision(18,6)", "@non_negative"]
        description: "Currency value of 1 point on redemption (e.g. 100 = 100 IDR / pt)"
      expiry_duration_days:
        type: int?
        attributes: ["@positive"]
        description: "Earned points expire after N days (null = never)"

      from_date:
        type: datetime
        attributes: ["@required"]
        description: "Program effective from"
      to_date:
        type: datetime?
        description: "Program effective until (null = open-ended)"
      is_active:
        type: bool
        attributes: ["@default(true)"]
        description: "Program is enabled"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata"

    indexes:
      - type: index
        fields: [company_id, is_active]

  - name: LoyaltyPointEntry
    collection: loyalty_point_entries
    description: "One signed movement in the loyalty points ledger"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique entry id"
      company_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Books owner # logical FK to organization.Company.id"
      loyalty_program_id:
        type: uuid
        attributes: ["@required", "@foreign_key(LoyaltyProgram.id)"]
        description: "The program this movement belongs to"
      customer_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "The member # logical FK to party.Party.id"

      entry_type:
        type: LoyaltyEntryType
        attributes: ["@required"]
        description: "earned (+) / redeemed (−) / expired (−)"
      points:
        type: decimal
        attributes: ["@required", "@precision(18,2)"]
        description: "Signed points moved (positive for earned, negative for redeemed/expired)"
      purchase_amount:
        type: decimal
        attributes: ["@default(0)", "@precision(18,2)", "@non_negative"]
        description: "The spend that generated earned points (0 for redemption/expiry)"

      source_type:
        type: string
        attributes: ["@required", "@max(40)"]
        description: "Producing document kind, e.g. pos_invoice / sales_invoice / redemption"
      source_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Producing document id # logical FK (source module owns it)"

      posting_date:
        type: datetime
        attributes: ["@required"]
        description: "When the movement posted"
      expiry_date:
        type: datetime?
        description: "When these earned points lapse (null = never)"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata"

    indexes:
      # Idempotency: one source doc earns/redeems at most once per entry_type.
      - type: unique
        fields: [company_id, source_type, source_id, entry_type]
        where: "deleted_at IS NULL"
      - type: index
        fields: [company_id, customer_id, loyalty_program_id]
      - type: index
        fields: [customer_id, entry_type]

enums:
  - name: LoyaltyProgramType
    description: "Flat or tiered loyalty scheme"
    variants:
      - name: single_tier
        description: "One collection factor for everyone"
        default: true
      - name: multiple_tier
        description: "Tier-dependent factors (tier resolution deferred)"

  - name: LoyaltyEntryType
    description: "Direction of a loyalty points movement"
    variants:
      - name: earned
        description: "Points accrued from a purchase (+)"
        default: true
      - name: redeemed
        description: "Points spent against a purchase (−)"
      - name: expired
        description: "Points lapsed past expiry (−)"

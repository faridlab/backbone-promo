# =============================================================================
# Domain: Platform
# Entity: Advertisement
# Description: Provider advertisements
# =============================================================================

# =============================================================================
# Enums
# =============================================================================

enums:
  # ---------------------------------------------------------------------------
  # Ad Billing Model
  # ---------------------------------------------------------------------------
  - name: AdBillingModel
    description: "Advertisement billing model"
    variants:
      - name: cpm
        description: "Cost per mille (1000 impressions)"
        default: true
      - name: cpc
        description: "Cost per click"
      - name: cpa
        description: "Cost per acquisition"
      - name: flat_rate
        description: "Flat rate"

# =============================================================================
# Models
# =============================================================================

models:
  # ---------------------------------------------------------------------------
  # Advertisement - Provider B2B advertisement
  # ---------------------------------------------------------------------------
  - name: Advertisement
    collection: advertisements
    description: "Provider B2B advertisement"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique advertisement identifier"

      # =======================================================================
      # Identification
      # =======================================================================
      name:
        type: string
        attributes: ["@required", "@max(100)"]
        description: "Ad name"

      ad_number:
        type: string
        attributes: ["@required", "@unique", "@max(30)"]
        description: "Ad reference number"

      # =======================================================================
      # Advertiser
      # =======================================================================
      provider_id:
        type: uuid
        attributes: ["@required", "@exclude_from_foreign_key_check"]
        description: "Advertising provider"  # logical FK to bersihir.Provider.id

      # =======================================================================
      # Placement
      # =======================================================================
      placement:
        type: AdPlacement
        attributes: ["@required"]
        description: "Ad placement location"

      position:
        type: int?
        attributes: ["@positive"]
        description: "Position in placement"

      # =======================================================================
      # Creative
      # =======================================================================
      headline:
        type: string?
        attributes: ["@max(100)"]
        description: "Ad headline"

      description:
        type: string?
        attributes: ["@max(255)"]
        description: "Ad description"

      image_url:
        type: string
        attributes: ["@required", "@max(500)"]
        description: "Ad image"

      image_url_mobile:
        type: string?
        attributes: ["@max(500)"]
        description: "Mobile image"

      # =======================================================================
      # Action
      # =======================================================================
      click_url:
        type: string?
        attributes: ["@max(500)"]
        description: "Click destination URL"

      action_type:
        type: string?
        attributes: ["@max(30)"]
        description: "Action type (provider, service, promo)"

      action_reference:
        type: string?
        attributes: ["@max(100)"]
        description: "Action reference ID"

      # =======================================================================
      # Targeting
      # =======================================================================
      target_zones:
        type: json
        attributes: ["@default('[]')"]
        description: "Zone IDs (empty = all)"

      target_services:
        type: json
        attributes: ["@default('[]')"]
        description: "Service type IDs"

      target_audience:
        type: string
        attributes: ["@default('all')", "@max(30)"]
        description: "Target audience"

      # =======================================================================
      # Schedule
      # =======================================================================
      status:
        type: AdStatus
        attributes: ["@default(draft)"]
        description: "Ad status"

      start_at:
        type: datetime
        attributes: ["@required"]
        description: "Ad start"

      end_at:
        type: datetime
        attributes: ["@required"]
        description: "Ad end"

      # =======================================================================
      # Budget & Billing
      # =======================================================================
      currency:
        type: string
        attributes: ["@default('IDR')", "@length(3)"]
        description: "Currency"

      billing_model:
        type: AdBillingModel
        attributes: ["@default(cpm)"]
        description: "Billing model"

      bid_amount:
        type: decimal
        attributes: ["@required", "@precision(10,2)", "@non_negative"]
        description: "Bid amount"

      daily_budget:
        type: decimal?
        attributes: ["@precision(12,2)", "@non_negative"]
        description: "Daily budget"

      total_budget:
        type: decimal?
        attributes: ["@precision(14,2)", "@non_negative"]
        description: "Total budget"

      budget_spent:
        type: decimal
        attributes: ["@default(0)", "@precision(14,2)", "@non_negative"]
        description: "Budget spent"

      # =======================================================================
      # Limits
      # =======================================================================
      max_impressions:
        type: int?
        attributes: ["@positive"]
        description: "Max impressions"

      max_clicks:
        type: int?
        attributes: ["@positive"]
        description: "Max clicks"

      frequency_cap:
        type: int?
        attributes: ["@positive"]
        description: "Max impressions per user per day"

      # =======================================================================
      # Statistics
      # =======================================================================
      total_impressions:
        type: int
        attributes: ["@default(0)", "@non_negative"]
        description: "Total impressions"

      total_clicks:
        type: int
        attributes: ["@default(0)", "@non_negative"]
        description: "Total clicks"

      total_conversions:
        type: int
        attributes: ["@default(0)", "@non_negative"]
        description: "Total conversions"

      conversion_value:
        type: decimal
        attributes: ["@default(0)", "@precision(14,2)", "@non_negative"]
        description: "Total conversion value"

      click_through_rate:
        type: decimal?
        attributes: ["@precision(5,4)"]
        description: "CTR"

      conversion_rate:
        type: decimal?
        attributes: ["@precision(5,4)"]
        description: "Conversion rate"

      # =======================================================================
      # Approval
      # =======================================================================
      approved_at:
        type: datetime?
        description: "Approval timestamp"

      approved_by:
        type: uuid?
        description: "Approved by user"

      rejection_reason:
        type: string?
        attributes: ["@max(500)"]
        description: "Rejection reason"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    relations:
      approved_by_user:
        type: sapiens.User?
        attributes: ["@one", "@foreign_key(approved_by)"]
        description: "Approving user"

      performances:
        type: AdPerformance[]
        attributes: ["@one_to_many"]
        description: "Daily performance records"
        inverse: advertisement

    indexes:
      - type: unique
        fields: [ad_number]
        where: "deleted_at IS NULL"
      - type: index
        fields: [provider_id, status]
      - type: index
        fields: [status, start_at, end_at]
      - type: index
        fields: [placement, status]

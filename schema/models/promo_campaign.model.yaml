# =============================================================================
# Domain: Platform
# Entities: PromoCampaign
# Description: Marketing promotion campaign with discount codes
# =============================================================================

models:
  # ---------------------------------------------------------------------------
  # PromoCampaign - Platform-wide promotional campaign
  # ---------------------------------------------------------------------------
  - name: PromoCampaign
    collection: promo_campaigns
    description: "Marketing promotion campaign with discount codes"

    fields:
      id:
        type: uuid
        attributes: ["@id", "@default(uuid)"]
        description: "Unique campaign identifier"

      # =======================================================================
      # Identification
      # =======================================================================
      name:
        type: string
        attributes: ["@required", "@max(100)"]
        description: "Campaign name"

      code:
        type: string
        attributes: ["@required", "@unique", "@max(30)"]
        description: "Promo code"

      description:
        type: string?
        attributes: ["@max(500)"]
        description: "Campaign description"

      # =======================================================================
      # Type & Value
      # =======================================================================
      promo_type:
        type: CampaignPromoType
        attributes: ["@required"]
        description: "Type of promotion"

      discount_value:
        type: decimal
        attributes: ["@required", "@precision(12,2)", "@non_negative"]
        description: "Discount value (% or amount)"

      max_discount:
        type: decimal?
        attributes: ["@precision(12,2)", "@non_negative"]
        description: "Maximum discount amount"

      # =======================================================================
      # Conditions
      # =======================================================================
      min_order_value:
        type: decimal?
        attributes: ["@precision(12,2)", "@non_negative"]
        description: "Minimum order value"

      min_items:
        type: int?
        attributes: ["@positive"]
        description: "Minimum items"

      # =======================================================================
      # Applicability
      # =======================================================================
      applicable_services:
        type: json
        attributes: ["@default('[]')"]
        description: "Applicable service type IDs"

      applicable_providers:
        type: json
        attributes: ["@default('[]')"]
        description: "Provider IDs (empty = all)"

      applicable_zones:
        type: json
        attributes: ["@default('[]')"]
        description: "Zone IDs (empty = all)"

      # =======================================================================
      # User Targeting
      # =======================================================================
      target_audience:
        type: CampaignTarget
        attributes: ["@default(all)"]
        description: "Target audience"

      target_user_ids:
        type: json
        attributes: ["@default('[]')"]
        description: "Specific user IDs"

      first_order_only:
        type: bool
        attributes: ["@default(false)"]
        description: "First order only"

      # =======================================================================
      # Schedule
      # =======================================================================
      status:
        type: CampaignStatus
        attributes: ["@default(draft)"]
        description: "Campaign status"

      start_at:
        type: datetime
        attributes: ["@required"]
        description: "Campaign start"

      end_at:
        type: datetime
        attributes: ["@required"]
        description: "Campaign end"

      # =======================================================================
      # Limits
      # =======================================================================
      total_budget:
        type: decimal?
        attributes: ["@precision(16,2)", "@non_negative"]
        description: "Total campaign budget"

      budget_used:
        type: decimal
        attributes: ["@default(0)", "@precision(16,2)", "@non_negative"]
        description: "Budget used"

      max_redemptions:
        type: int?
        attributes: ["@positive"]
        description: "Max total redemptions"

      max_per_user:
        type: int
        attributes: ["@default(1)", "@positive"]
        description: "Max per user"

      # =======================================================================
      # Statistics
      # =======================================================================
      total_redemptions:
        type: int
        attributes: ["@default(0)", "@non_negative"]
        description: "Total redemptions"

      unique_users:
        type: int
        attributes: ["@default(0)", "@non_negative"]
        description: "Unique users"

      total_discount_given:
        type: decimal
        attributes: ["@default(0)", "@precision(16,2)", "@non_negative"]
        description: "Total discount given"

      total_order_value:
        type: decimal
        attributes: ["@default(0)", "@precision(16,2)", "@non_negative"]
        description: "Total order value generated"

      # =======================================================================
      # Funding
      # =======================================================================
      funded_by:
        type: CampaignFunder
        attributes: ["@default(platform)"]
        description: "Who funds the discount"

      platform_share:
        type: decimal
        attributes: ["@default(100)", "@precision(5,2)", "@range(0, 100)"]
        description: "Platform's share of discount"

      # =======================================================================
      # Display
      # =======================================================================
      display_on_app:
        type: bool
        attributes: ["@default(true)"]
        description: "Show in app"

      banner_image_url:
        type: string?
        attributes: ["@max(500)"]
        description: "Campaign banner"

      terms_and_conditions:
        type: string?
        attributes: ["@max(2000)"]
        description: "Terms and conditions"

      metadata:
        type: Metadata
        attributes: ["@audit_metadata"]
        description: "Audit metadata (created_at, updated_at, deleted_at, created_by, updated_by, deleted_by)"

    indexes:
      - type: unique
        fields: [code]
        where: "deleted_at IS NULL"
      - type: index
        fields: [status, start_at, end_at]
      - type: index
        fields: [promo_type, status]
      - type: index
        fields: [target_audience, status]

# =============================================================================
# Enums
# =============================================================================

enums:
  # ---------------------------------------------------------------------------
  # Promo Type
  # ---------------------------------------------------------------------------
  - name: CampaignPromoType
    description: "Type of promotion for campaigns"
    variants:
      - name: percentage
        description: "Percentage discount"
        default: true
      - name: fixed_amount
        description: "Fixed amount discount"
      - name: free_delivery
        description: "Free delivery"
      - name: free_item
        description: "Free item"
      - name: cashback
        description: "Cashback"
      - name: bundle
        description: "Bundle discount"

  # ---------------------------------------------------------------------------
  # Campaign Status
  # ---------------------------------------------------------------------------
  - name: CampaignStatus
    description: "Campaign status"
    variants:
      - name: draft
        description: "Draft"
        default: true
      - name: scheduled
        description: "Scheduled"
      - name: active
        description: "Active"
      - name: paused
        description: "Paused"
      - name: ended
        description: "Ended"
      - name: cancelled
        description: "Cancelled"

  # ---------------------------------------------------------------------------
  # Campaign Target
  # ---------------------------------------------------------------------------
  - name: CampaignTarget
    description: "Target audience for campaign"
    variants:
      - name: all
        description: "All users"
        default: true
      - name: new_users
        description: "New users"
      - name: returning
        description: "Returning users"
      - name: inactive
        description: "Inactive users"
      - name: specific
        description: "Specific users"
      - name: loyal
        description: "Loyal customers"

  # ---------------------------------------------------------------------------
  # Campaign Funder
  # ---------------------------------------------------------------------------
  - name: CampaignFunder
    description: "Who funds the campaign discount"
    variants:
      - name: platform
        description: "Platform funded"
        default: true
      - name: provider
        description: "Provider funded"
      - name: shared
        description: "Shared funding"

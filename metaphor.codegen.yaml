# Codegen policy for promo.
#
# `user_owned` globs are hand-written files that live inside generator-owned trees but are
# NOT schema-derived. `metaphor schema generate [--force]` skips them wholesale (never reads,
# merges, or deletes them). Everything else in src/ is regenerated from schema/models.
#
# Re-exports/declarations that must sit alongside generated code live inside
# `// <<< CUSTOM ... // END CUSTOM` markers (service/mod.rs, presentation/http/mod.rs, lib.rs)
# and are preserved by the marker mechanism, not listed here.
#
# Add your hand-authored services, handlers, tests, and docs below as you write them.

user_owned:
  - "src/application/service/promo_events.rs"
  - "src/application/service/promo_ports.rs"
  - "src/application/service/promo_write_service.rs"
  # Own the hand-written promo SQL (the structural rule/bundle searches behind resolve, the coupon
  # lookup + its guarded redemption burn, and the loyalty accrual/balance/redemption ledger) that the
  # write service orchestrates. Declared here — not renamed with a `_custom` suffix — so the generator
  # skips them wholesale; this declaration is what makes editing them legitimate.
  - "src/infrastructure/persistence/coupon_code_repository.rs"
  - "src/infrastructure/persistence/coupon_redemption_repository.rs"
  - "src/infrastructure/persistence/loyalty_point_entry_repository.rs"
  - "src/infrastructure/persistence/loyalty_program_repository.rs"
  - "src/infrastructure/persistence/pricing_rule_repository.rs"
  - "src/infrastructure/persistence/promo_bundle_component_repository.rs"
  - "src/infrastructure/persistence/promo_bundle_repository.rs"
  - "tests/cart_pos_seam.rs"
  - "tests/cart_resolution.rs"
  - "tests/cart_selling_seam.rs"
  - "tests/integrity_probes.rs"
  - "tests/price_resolution_seam.rs"
  - "tests/promo_golden_cases.rs"
  - "scripts/**"

  # Behavior tests (the golden cases / oracle) + BDD features.
  - "tests/features/**"

  # Hand-authored module documentation.
  - "docs/**"
